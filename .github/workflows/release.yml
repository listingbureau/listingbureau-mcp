name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify versions match (package.json, manifest.json, git tag)
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          MAN_VERSION=$(node -p "require('./manifest.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$MAN_VERSION" ]; then
            echo "::error::Version mismatch: package.json=$PKG_VERSION manifest.json=$MAN_VERSION"
            exit 1
          fi
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version mismatch: tag=$TAG_VERSION package.json=$PKG_VERSION"
            exit 1
          fi

      - name: Install mcpb CLI
        run: npm install -g @anthropic-ai/mcpb

      - name: Validate manifest
        run: mcpb validate .

      - name: Pack .mcpb extension
        run: mcpb pack . listingbureau-mcp.mcpb

      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach .mcpb to release
        run: gh release upload "${{ github.ref_name }}" listingbureau-mcp.mcpb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
